name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: node --check on all JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Find and check every .js file
        run: |
          set -e
          fail=0
          for f in $(find packages examples -name '*.js' -not -path '*/node_modules/*' 2>/dev/null); do
            if ! node --check "$f"; then
              echo "SYNTAX ERROR in $f"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "All JS files parse cleanly."

  install:
    name: npm install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run test script
        run: npm test --if-present

      - name: Run lint script
        run: npm run lint --if-present

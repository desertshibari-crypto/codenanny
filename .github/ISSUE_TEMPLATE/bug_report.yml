name: Bug report
description: Something's broken or behaving unexpectedly
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The clearer the report, the faster the fix.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I ran `codenanny wizard` and clicked Next on step 3...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: The wizard should have advanced to the credentials step.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that someone else can follow on their own machine.
      placeholder: |
        1. Clone the repo
        2. `npm install`
        3. `npm run wizard`
        4. ...
    validations:
      required: true

  - type: input
    id: codenanny-version
    attributes:
      label: codenanny version
      description: Output of `git rev-parse HEAD` or the version tag you're on
      placeholder: 0.1.0 or commit abc1234
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version`
      placeholder: v20.11.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Windows (native)
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / error output
      description: Anything printed to the terminal or shown in the browser console
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md)
          required: true
